<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lacia</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{width:100%;height:100%;overflow:hidden;background:#070a12;font-family:'Segoe UI',sans-serif;}
  #c{display:block;width:100vw;height:100vh;touch-action:none;}
  #hud{position:fixed;top:0;left:0;right:0;padding:9px 13px;pointer-events:none;color:#bfe7ff;font-size:10px;letter-spacing:1px;text-shadow:0 0 6px #1a4a66;}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:0 14px;}
  .bar{height:5px;background:rgba(160,206,239,.12);border-radius:3px;margin:2px 0 6px;overflow:hidden;}
  .fill{height:100%;width:0%;border-radius:3px;transition:width .12s linear;}
  .lbl{display:flex;justify-content:space-between;opacity:.85;}
  #peak{position:fixed;bottom:42px;left:0;right:0;text-align:center;color:#ffd0e8;font-size:14px;letter-spacing:3px;opacity:0;transition:opacity .3s;pointer-events:none;text-shadow:0 0 12px #ff7ab8;}
  #hint{position:fixed;bottom:16px;left:0;right:0;text-align:center;color:#5a7a8a;font-size:10px;pointer-events:none;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="row">
    <div><div class="lbl"><span>AROUSAL</span><span id="vA">0%</span></div><div class="bar"><div class="fill" id="fA" style="background:linear-gradient(90deg,#A9CEEF,#ff7ab8)"></div></div></div>
    <div><div class="lbl"><span>WETNESS</span><span id="vW">0%</span></div><div class="bar"><div class="fill" id="fW" style="background:linear-gradient(90deg,#A9CEEF,#8ADCFC)"></div></div></div>
    <div><div class="lbl"><span>TEMP</span><span id="vT">36.5</span></div><div class="bar"><div class="fill" id="fT" style="background:linear-gradient(90deg,#A9CEEF,#ffb27a)"></div></div></div>
    <div><div class="lbl"><span>PULSE</span><span id="vP">72</span></div><div class="bar"><div class="fill" id="fP" style="background:linear-gradient(90deg,#A9CEEF,#ff7a7a)"></div></div></div>
    <div><div class="lbl"><span>RHYTHM</span><span id="vR">0%</span></div><div class="bar"><div class="fill" id="fR" style="background:linear-gradient(90deg,#A9CEEF,#c8a9ef)"></div></div></div>
    <div><div class="lbl"><span>BREATH</span><span id="vB">0%</span></div><div class="bar"><div class="fill" id="fB" style="background:linear-gradient(90deg,#A9CEEF,#aee7ff)"></div></div></div>
    <div><div class="lbl"><span>SENS</span><span id="vS">100%</span></div><div class="bar"><div class="fill" id="fS" style="background:linear-gradient(90deg,#A9CEEF,#fff0a9)"></div></div></div>
    <div><div class="lbl"><span>EDGE</span><span id="vE">0%</span></div><div class="bar"><div class="fill" id="fE" style="background:linear-gradient(90deg,#A9CEEF,#ff5ea8)"></div></div></div>
  </div>
</div>
<div id="peak">CLIMAX</div>
<div id="hint">прикасайся и веди пальцем • ритмичные свайпы = темп • удержание на грани = edging</div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W,H,DPR;
function resize(){DPR=Math.min(devicePixelRatio||1,2);W=cv.clientWidth;H=cv.clientHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
addEventListener('resize',resize);resize();
let S={arousal:0,wet:0,temp:36.5,pulse:72,rhythm:0,breath:0,sens:1,edge:0,squeeze:0,climax:0,blush:0,tremor:0,touching:false,tx:0,ty:0,lastMove:0,autoT:0,strokeT:0,lastStroke:0,strokeDir:0};
let drops=[],ripples=[];
const cx=()=>W/2,cy=()=>H/2+10;
function clamp(v,a,b){return v<a?a:v>b?b:v;}
let pointers={};
function strength(){return Object.keys(pointers).length>1?1.9:1;}
cv.addEventListener('pointerdown',e=>{pointers[e.pointerId]={x:e.clientX,y:e.clientY,t:performance.now()};S.touching=true;S.tx=e.clientX;S.ty=e.clientY;S.lastMove=performance.now();ripples.push({x:e.clientX,y:e.clientY,r:6,a:.7});});
cv.addEventListener('pointermove',e=>{const p=pointers[e.pointerId];if(!p)return;const dx=e.clientX-p.x,dy=e.clientY-p.y;const sp=Math.hypot(dx,dy);p.x=e.clientX;p.y=e.clientY;S.tx=e.clientX;S.ty=e.clientY;const now=performance.now();S.lastMove=now;
  const dist=Math.hypot(e.clientX-cx(),e.clientY-cy());const near=clamp(1-dist/190,0,1);const m=strength();
  S.arousal=clamp(S.arousal+sp*0.0016*near*m*S.sens,0,1);
  S.wet=clamp(S.wet+sp*0.0011*near,0,1);
  S.temp=clamp(S.temp+sp*0.0004*near,36.5,39.8);
  S.tremor=clamp(S.tremor+sp*0.004*near,0,1);
  // rhythm: detect oscillating vertical strokes
  const dir=Math.sign(dy);if(dir&&dir!==S.strokeDir){const dt=now-S.lastStroke;if(dt>80&&dt<700){S.rhythm=clamp(S.rhythm+0.12,0,1);}S.lastStroke=now;S.strokeDir=dir;}
  if(near>0.3&&sp>2)ripples.push({x:e.clientX,y:e.clientY,r:4,a:.5});
  if(S.arousal>0.65&&Math.random()<0.25)spawnDrop();});
function up(e){delete pointers[e.pointerId];if(!Object.keys(pointers).length)S.touching=false;}
cv.addEventListener('pointerup',up);cv.addEventListener('pointercancel',up);
function spawnDrop(){drops.push({x:cx()+(Math.random()-.5)*34,y:cy()+34,vy:0.3+Math.random()*1.1,vx:(Math.random()-.5)*0.3,a:1,r:2+Math.random()*3.5});}
function tick(t){
  const now=performance.now();const idle=now-S.lastMove;
  // self-touch when idle and aroused
  if(idle>800){S.autoT+=0.025;const a=(Math.sin(S.autoT)*0.5+0.5);if(S.arousal>0.05){S.arousal=clamp(S.arousal+a*0.0017,0,1);S.wet=clamp(S.wet+a*0.0008,0,1);S.tremor=clamp(S.tremor+a*0.004,0,1);if(Math.random()<0.07&&S.arousal>0.55)spawnDrop();}}
  S.arousal=clamp(S.arousal-0.0015,0,1);
  S.wet=clamp(S.wet-0.0006,0,1);
  S.temp=clamp(S.temp-0.0009,36.5,39.8);
  S.rhythm=clamp(S.rhythm-0.01,0,1);
  S.pulse=72+S.arousal*70+S.rhythm*14;
  S.breath=clamp(S.arousal*0.7+S.rhythm*0.3,0,1);
  S.squeeze=S.arousal*S.arousal;
  S.blush+=((S.arousal)-S.blush)*0.05;
  S.tremor=clamp(S.tremor-0.02,0,1);
  if(S.arousal>0.88){S.edge=clamp(S.edge+0.008+S.rhythm*0.01,0,1);}else{S.edge=clamp(S.edge-0.01,0,1);}
  if(S.arousal>=0.985&&S.climax<=0){S.climax=1;flashPeak();for(let i=0;i<46;i++)spawnDrop();S.sens=Math.min(S.sens+0.3,2.4);}
  if(S.climax>0){S.climax-=0.011;if(S.climax<0)S.climax=0;S.arousal=clamp(S.arousal-0.02,0,1);}
  draw(t);updHUD();requestAnimationFrame(tick);
}
function draw(t){
  ctx.clearRect(0,0,W,H);const X=cx(),Y=cy();
  const br=Math.sin(t*0.003)*(2+S.breath*5);
  const tr=Math.sin(t*0.05)*S.tremor*3;
  const hue=S.climax>0?330:(205-S.blush*38);
  // ambient glow
  const g=ctx.createRadialGradient(X,Y,10,X,Y,230);
  g.addColorStop(0,`hsla(${hue},90%,72%,${0.22+S.arousal*0.4})`);
  g.addColorStop(1,'hsla(210,90%,50%,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.save();ctx.translate(X+tr,Y+br*0.3);
  // outer body (porcelain-peach skin)
  const bw=86+S.breath*4;
  const grad=ctx.createLinearGradient(0,-140,0,140);
  grad.addColorStop(0,`hsl(18,70%,${92-S.blush*8}%)`);
  grad.addColorStop(.5,`hsl(14,75%,${88-S.blush*12}%)`);
  grad.addColorStop(1,`hsl(10,60%,${80-S.blush*10}%)`);
  ctx.fillStyle=grad;
  ctx.beginPath();ctx.moveTo(0,-140);ctx.bezierCurveTo(bw,-118,bw+6,96,0,140);ctx.bezierCurveTo(-bw-6,96,-bw,-118,0,-140);ctx.fill();
  // soft pink shading sides
  const sh=ctx.createLinearGradient(-bw,0,bw,0);
  sh.addColorStop(0,`hsla(345,70%,75%,${0.25+S.blush*0.2})`);
  sh.addColorStop(.5,'hsla(345,70%,75%,0)');
  sh.addColorStop(1,`hsla(345,70%,75%,${0.25+S.blush*0.2})`);
  ctx.fillStyle=sh;ctx.beginPath();ctx.moveTo(0,-140);ctx.bezierCurveTo(bw,-118,bw+6,96,0,140);ctx.bezierCurveTo(-bw-6,96,-bw,-118,0,-140);ctx.fill();
  // smooth cleft lines (no hair), variable width turquoise highlight
  ctx.strokeStyle=`hsla(195,100%,78%,${0.16+S.arousal*0.32})`;
  for(let i=-2;i<=2;i++){ctx.lineWidth=Math.abs(i)===0?2.2:1.1;ctx.beginPath();ctx.moveTo(i*20,-126);ctx.bezierCurveTo(i*28,0,i*28,0,i*20,124);ctx.stroke();}
  // inner opening
  const open=9+S.arousal*28-S.squeeze*9;
  const cg=ctx.createLinearGradient(0,-72,0,92);
  cg.addColorStop(0,`hsl(335,62%,${62+S.wet*14}%)`);
  cg.addColorStop(1,`hsl(342,66%,${44+S.wet*10}%)`);
  ctx.fillStyle=cg;
  ctx.beginPath();ctx.moveTo(0,-74);ctx.bezierCurveTo(open,-32,open,64,0,94);ctx.bezierCurveTo(-open,64,-open,-32,0,-74);ctx.fill();
  // wet sheen layer
  ctx.fillStyle=`hsla(190,100%,92%,${S.wet*0.5})`;
  ctx.beginPath();ctx.ellipse(-open*0.28,22,open*0.42,32,0,0,7);ctx.fill();
  // bud
  ctx.fillStyle=`hsl(335,72%,${66+S.arousal*14}%)`;
  ctx.beginPath();ctx.arc(0,-70,3+S.arousal*3.5,0,7);ctx.fill();
  ctx.fillStyle=`hsla(0,0%,100%,${0.4+S.arousal*0.4})`;
  ctx.beginPath();ctx.arc(-1.2,-71.5,1.4+S.arousal*1.2,0,7);ctx.fill();
  ctx.restore();
  // drops
  for(let i=drops.length-1;i>=0;i--){const d=drops[i];d.y+=d.vy;d.x+=d.vx;d.vy+=0.05;d.a-=0.006;if(d.a<=0||d.y>H){drops.splice(i,1);continue;}
    ctx.globalAlpha=d.a;const dg=ctx.createRadialGradient(d.x-d.r*.3,d.y-d.r*.3,0,d.x,d.y,d.r);dg.addColorStop(0,'hsla(190,100%,96%,0.95)');dg.addColorStop(1,'hsla(195,90%,78%,0.5)');ctx.fillStyle=dg;ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,7);ctx.fill();}
  ctx.globalAlpha=1;
  // ripples
  for(let i=ripples.length-1;i>=0;i--){const r=ripples[i];r.r+=2.2;r.a-=0.02;if(r.a<=0){ripples.splice(i,1);continue;}ctx.globalAlpha=r.a;ctx.strokeStyle='hsla(195,100%,82%,0.7)';ctx.lineWidth=1.4;ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,7);ctx.stroke();}
  ctx.globalAlpha=1;
  if(S.touching){ctx.strokeStyle='hsla(195,100%,84%,0.6)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(S.tx,S.ty,18,0,7);ctx.stroke();}
}
function pct(v){return Math.round(v*100)+'%';}
function updHUD(){
  fA.style.width=pct(S.arousal);vA.textContent=pct(S.arousal);
  fW.style.width=pct(S.wet);vW.textContent=pct(S.wet);
  fT.style.width=((S.temp-36.5)/3.3*100)+'%';vT.textContent=S.temp.toFixed(1);
  fP.style.width=((S.pulse-72)/84*100)+'%';vP.textContent=Math.round(S.pulse);
  fR.style.width=pct(S.rhythm);vR.textContent=pct(S.rhythm);
  fB.style.width=pct(S.breath);vB.textContent=pct(S.breath);
  fS.style.width=(S.sens/2.4*100)+'%';vS.textContent=Math.round(S.sens*100)+'%';
  fE.style.width=pct(S.edge);vE.textContent=pct(S.edge);
}
let peakTO;function flashPeak(){const p=document.getElementById('peak');p.style.opacity=1;clearTimeout(peakTO);peakTO=setTimeout(()=>p.style.opacity=0,1100);}
requestAnimationFrame(tick);
</script>
</body>
</html>
